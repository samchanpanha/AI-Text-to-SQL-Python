services:
  app:
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000
      --workers 4 --limit-concurrency 100 --log-level info
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "2"
          memory: "2G"
        reservations:
          cpus: "1"
          memory: "1G"
    environment:
      APP_ENV: production
      DEBUG: "false"
      LOG_LEVEL: INFO
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./nuxt
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "1"
          memory: "1G"
        reservations:
          cpus: "0.5"
          memory: "512M"
    environment:
      NUXT_PUBLIC_API_BASE_URL: http://app:8000
      NUXT_PUBLIC_WS_URL: ws://app:8000
      NODE_ENV: production
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
      - frontend
    restart: unless-stopped

  mysql:
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: "4G"
