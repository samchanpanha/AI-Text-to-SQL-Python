services:
  app:
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000
      --workers 4 --limit-concurrency 100 --log-level info
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "2"
          memory: "2G"
        reservations:
          cpus: "1"
          memory: "1G"
    environment:
      APP_ENV: production
      DEBUG: "false"
      LOG_LEVEL: INFO
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped

  mysql:
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: "4G"
