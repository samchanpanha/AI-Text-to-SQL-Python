services:
  app:
    build: .
    env_file: .env
    environment:
      DB_HOST: mysql
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - report_temp:/tmp/reports
      - logs_data:/var/log/app
    restart: unless-stopped

  frontend:
    build:
      context: ./nuxt
      dockerfile: Dockerfile
    environment:
      NUXT_PUBLIC_API_BASE_URL: http://app:8000
      NUXT_PUBLIC_WS_URL: ws://app:8000
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000
    depends_on:
      - app
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root_password}
      MYSQL_DATABASE: ${DB_NAME:-text_to_sql}
      MYSQL_USER: ${DB_USER:-app}
      MYSQL_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    profiles: ["n8n"]
    environment:
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_HOST: localhost
      N8N_METRICS: false
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678}
      DB_TYPE: sqlite
      DB_SQLITE_DATABASE: /home/node/.n8n/database.sqlite
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-changeme-n8n-key-32chars!!}
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  mysql_data:
  report_temp:
  n8n_data:
  logs_data:
  frontend_node_modules:
