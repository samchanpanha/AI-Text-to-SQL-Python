services:
  app:
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - report_temp:/tmp/reports
      - ./logs:/var/log/app
    environment:
      APP_ENV: development
      DEBUG: "true"
      LOG_LEVEL: DEBUG
      LOG_OUTPUT: both
      LOG_FILE: /var/log/app/app.log
      LOG_DB_ENABLED: "true"

  mysql:
    ports:
      - "3306:3306"

  n8n:
    ports:
      - "5678:5678"
    environment:
      N8N_DEBUG: true
      N8N_METRICS: false
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows:ro
